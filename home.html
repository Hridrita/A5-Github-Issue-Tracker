<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Issue-Tracker | Home</title>

     <!--tailwind + daisyUI-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!--font Awesome-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!--font-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
    *{
        font-family: "Geist", sans-serif;
        
    }
</style>
</head>
<body>
    <!--nav bar-->
    <section>
        <nav class="flex flex-col md:flex-row justify-between items-center px-4 md:px-[80px] py-4 gap-4">
             <div class="flex items-center gap-2">
                <img class="w-[30px] md:w-[36px]" src="assets/github-logo.png">
                <h1 class="font-semibold pt-2">GitHub Issues Tracker</h1>
             </div>

             <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
    <label class="input bg-base-200 flex items-center gap-2">
        <i class="fa-brands fa-sistrix opacity-70"></i>
        <input id="search-box" type="text" class="grow" placeholder="Search Issues" />
    </label>
    <button id="search-btn" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issues</button>
</div>
        </nav>
</section>


<!--all buttons-->

<section class="flex justify-start gap-2 border-[#ffffffFF] shadow-sm mx-auto w-[1110px] p-4 mt-[60px] ">
    <button id="all-btn" class="btn btn-primary">ALL</button>
    <button id="open-btn" class="btn btn-outline border-base-300">Open</button>
    <button id="closed-btn" class="btn btn-outline border-base-300">Closed</button>
</section>


<!--issues no-->

    <section class="flex flex-col md:flex-row justify-between items-center gap-4 border-white shadow-sm mx-auto w-full max-w-[1110px] p-4 mt-[16px] bg-white rounded-lg">

    <div class="flex items-center gap-3">
        <img src="assets/Aperture.png" class="w-[50px]">
        <div>
            <h2 id="total-issue" class="font-semibold text-xl ">50 Issues</h2>
        <p class="text-[#64748B]">Track and manage your project issues</p>
     </div>
        </div>

        <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-[#22C55E] rounded-full"></div> <span class="text-sm font-medium text-[#475569]">Open</span>
        </div>

        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div> <span class="text-sm font-medium text-[#475569]">Closed</span>
        </div>
    </div>

</section>


<!--spinner-->
    <div id="loading-spinner" class="h-[60vh] flex justify-center items-center hidden">
        <span class="loading loading-spinner text-info"></span>
    </div>


<!--all cards-->

<section id="card-container" class="grid grid-cols-1 md:grid-cols-4 border-white shadow-sm mx-auto w-[1110px] p-4 mt-[16px] space-y-3 min-h-[400px]">
    
    
</section>




<script src="script/home.js"></script>
    
</body>
</html>
