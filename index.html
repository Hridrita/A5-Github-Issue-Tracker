<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-tracker | LogIn</title>

    <!--tailwind + daisyUI-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!--font Awesome-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!--font-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>

</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center p-4">  <!--min-h-screen use hoy page er min height then width 448 px-->
    <div class="w-full max-w-[520px] bg-white border border-base-300 rounded-3xl shadow-sm p-6">
        <div class="logo w-[100px]  mx-auto pt-20 "> <!--pt=padding top-->
        <img src="assets/github-logo.png" alt="">
    </div>

    <h2 class="font-bold text-center pt-4 text-xl">GitHub Issues Tracker</h2>
        <p class="text-center text-[#64748bFF]">Sign in to manage your issues</p>

    <div class="form pt-10">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-semibold">Username</label>
          <input id="input-name" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200"  placeholder="Enter Username" /> <!--ekhne value deyay by defalut ei no ta imout box e uthe thkbe-->

          <br>

          <label class="label text-neutral font-semibold ">Password</label>
          <input id="input-pass" maxlength="8" type="password" class="input rounded-full bg-base-200 " placeholder="Enter Password"/>

          <button id="sign-btn" class="btn btn-primary mt-4 rounded-full">Sign In</button>
        </fieldset>
      </div>
    </div>
    </div>
    </div>
    

    <script src="script/login.js"></script>
    
    
</body>
</html>
